<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran - Koperasi Charta Cempaka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="form-section">
        <div class="form-wrapper">

            <!-- Kiri: Intro -->
            <div class="form-intro">
                <p class="form-tag">Pendaftaran Anggota</p>
                <h2 class="form-title">Mulai perjalanan finansial Anda.</h2>
                <p class="form-desc">
                    Isi formulir berikut untuk menjadi anggota resmi Koperasi
                    Charta Cempaka. Proses pendaftaran cepat dan mudah.
                </p>
            </div>

            <!-- Kanan: Form -->
            <form id="registrationForm" onsubmit="return validasiForm(event)">

                <div class="field-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap Anda">
                </div>

                <div class="field-group">
                    <label for="nik">NIK</label>
                    <input type="text" id="nik" name="nik" placeholder="16 digit Nomor Induk Kependudukan" maxlength="16">
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label for="tptLahir">Tempat Lahir</label>
                        <input type="text" id="tptLahir" name="tptLahir" placeholder="Kota tempat lahir">
                    </div>
                    <div class="field-group">
                        <label for="tglLahir">Tanggal Lahir</label>
                        <input type="date" id="tglLahir" name="tglLahir">
                    </div>
                </div>

                <div class="field-group">
                    <label for="alamat">Alamat</label>
                    <input type="text" id="alamat" name="alamat" placeholder="Alamat lengkap Anda">
                </div>

                <div class="field-group">
                    <label for="noHp">No. HP</label>
                    <input type="text" id="noHp" name="noHp" placeholder="Nomor handphone aktif">
                </div>

                <div class="field-group">
                    <label>Pekerjaan</label>
                    <div class="radio-cards">
                        <label class="radio-card" for="pns">
                            <input type="radio" id="pns" name="pekerjaan" value="PNS">
                            <div class="radio-card-content">
                                <span class="radio-card-title">PNS</span>
                                <span class="radio-card-desc">Pegawai Negeri Sipil</span>
                            </div>
                        </label>
                        <label class="radio-card" for="swasta">
                            <input type="radio" id="swasta" name="pekerjaan" value="Swasta">
                            <div class="radio-card-content">
                                <span class="radio-card-title">Swasta</span>
                                <span class="radio-card-desc">Karyawan perusahaan swasta</span>
                            </div>
                        </label>
                        <label class="radio-card" for="wiraswasta">
                            <input type="radio" id="wiraswasta" name="pekerjaan" value="Wiraswasta">
                            <div class="radio-card-content">
                                <span class="radio-card-title">Wiraswasta</span>
                                <span class="radio-card-desc">Usaha mandiri / pengusaha</span>
                            </div>
                        </label>
                        <label class="radio-card" for="lainnya">
                            <input type="radio" id="lainnya" name="pekerjaan" value="Lainnya">
                            <div class="radio-card-content">
                                <span class="radio-card-title">Lainnya</span>
                                <span class="radio-card-desc">Pelajar, pensiunan, dll</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Kirim Pendaftaran →</button>

            </form>
        </div>
    </section>

    <script src="js/validasi.js"></script>
</body>
</html>
